<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Anniversary ♡</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;0,400;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root { --dark:#07070f; --stem:#14757a; --stem-light:#39c6d6; --petal:#ff8fab; --gold:#ffd166; --leaf:#1aaa7a; }
    body { margin:0; padding:0; background:var(--dark); overscroll-behavior:none; font-family:'Cormorant Garamond',Georgia,serif; perspective:100px; -webkit-user-select:none; user-select:none; }
    body.not-loaded * { animation-play-state:paused !important; }
    .main-container { height:100dvh; width:100vw; display:flex; align-items:flex-end; justify-content:center; padding-bottom:40px; overflow:hidden; position:relative; }
    .night { position:fixed; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 90%,rgba(57,198,214,.07) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 50% 10%,rgba(26,10,46,.9) 0%,transparent 80%),linear-gradient(160deg,#0d0820 0%,#07070f 50%,#0b0e1a 100%); z-index:0; transition:opacity 1.2s ease; }
    #stars { position:fixed; inset:0; z-index:0; pointer-events:none; transition:opacity 1s ease; }
    .star { position:absolute; border-radius:50%; background:#fff; opacity:.5; animation:twinkle var(--dur,3s) ease-in-out infinite var(--del,0s); }
    @keyframes twinkle { 0%,100%{opacity:.1;transform:scale(1)} 50%{opacity:.9;transform:scale(1.5)} }
    /* login */
    #login-screen { position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse at 50% 40%,rgba(26,10,46,.97) 0%,rgba(7,7,15,.99) 100%); transition:opacity 1.3s ease,transform 1.3s ease; }
    #login-screen.fade-out { opacity:0; transform:translateY(-40px) scale(1.03); pointer-events:none; }
    .login-card { text-align:center; padding:3.5rem 2.5rem; max-width:420px; width:90%; border:1px solid rgba(255,143,171,.15); border-radius:3px; position:relative; }
    .login-card::before,.login-card::after { content:''; position:absolute; width:30px; height:30px; border-color:rgba(255,143,171,.3); border-style:solid; }
    .login-card::before { top:-1px; left:-1px; border-width:2px 0 0 2px; }
    .login-card::after { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }
    .login-badge { font-size:.7rem; letter-spacing:.35em; text-transform:uppercase; color:rgba(255,255,255,.25); margin-bottom:1.8rem; }
    .login-q { font-size:clamp(1.6rem,5vw,2.4rem); font-style:italic; font-weight:300; color:rgba(255,255,255,.9); line-height:1.3; margin-bottom:.5rem; }
    .login-hint { font-size:.85rem; font-style:italic; color:rgba(255,255,255,.22); margin-bottom:2.5rem; }
    #name-input { width:100%; background:transparent; border:none; border-bottom:1px solid rgba(255,143,171,.35); padding:.7rem .2rem; font-size:1.35rem; font-family:'Cormorant Garamond',serif; font-style:italic; color:#fff; text-align:center; outline:none; caret-color:var(--petal); transition:border-color .3s; display:block; margin-bottom:.6rem; }
    #name-input:focus { border-bottom-color:var(--petal); }
    #name-input::placeholder { color:rgba(255,255,255,.18); font-style:italic; }
    #login-error { min-height:1.3em; font-size:.82rem; font-style:italic; color:rgba(255,100,100,.7); margin-bottom:1.8rem; }
    #enter-btn { background:transparent; border:1px solid rgba(255,143,171,.4); color:rgba(255,255,255,.75); padding:.7rem 2.5rem; font-family:'Cormorant Garamond',serif; font-size:1rem; letter-spacing:.2em; cursor:pointer; border-radius:2px; transition:all .3s; }
    #enter-btn:hover { background:rgba(255,143,171,.08); border-color:var(--petal); color:#fff; }
    /* greeting */
    #greeting { position:fixed; top:2.2rem; left:0; right:0; text-align:center; z-index:50; opacity:0; transform:translateY(-12px); transition:opacity 1.2s ease .6s,transform 1.2s ease .6s; pointer-events:none; }
    #greeting.show { opacity:1; transform:translateY(0); }
    .greeting-line { font-size:clamp(1.15rem,2.2vw,1.3rem); font-style:normal; font-weight:600; color:#fff; letter-spacing:-.01em; text-transform:uppercase; text-shadow:0 0 12px rgba(255,255,255,.35), 0 0 24px rgba(57,198,214,.25); }
    /* cycling pet name */
    #pet-name-el { display:inline-block; color:var(--petal); transition:opacity .42s ease,transform .42s ease; }
    #pet-name-el.leaving { opacity:0; transform:translateY(-18px) scale(.85); }
    #pet-name-el.entering { opacity:0; transform:translateY(18px) scale(.85); }
    /* message */
    #message { position:fixed; bottom:2.2rem; left:0; right:0; text-align:center; z-index:50; opacity:0; transition:opacity 1.5s ease 4.5s; pointer-events:none; }
    #message.show { opacity:1; }
    .msg-text { font-size:clamp(.85rem,2vw,1.1rem); font-style:italic; color:rgba(255,255,255,.3); letter-spacing:.08em; }
    .msg-heart { display:block; margin-top:.3rem; color:var(--petal); font-size:.8em; letter-spacing:.35em; opacity:.6; }
    /* flowers */
    .flowers { position:relative; transform:scale(0.9); transform-origin:bottom center; z-index:10; transition:opacity 1s ease; }
    .flower { position:absolute; bottom:10vmin; transform-origin:bottom center; display:flex; flex-direction:column; align-items:center; cursor:pointer; }
    .flower--1 { animation:sway1 4.2s ease-in-out infinite; }
    .flower--2 { left:48%; transform:rotate(20deg); animation:sway2 3.8s ease-in-out infinite; }
    .flower--3 { left:48%; transform:rotate(-15deg); animation:sway3 4.5s ease-in-out infinite; }
    @keyframes sway1 { 0%,100%{transform:rotate(2deg)} 50%{transform:rotate(-2deg)} }
    @keyframes sway2 { 0%,100%{transform:rotate(18deg)} 50%{transform:rotate(14deg)} }
    @keyframes sway3 { 0%,100%{transform:rotate(-18deg)} 50%{transform:rotate(-20deg) rotateY(-10deg)} }
    .flower__line { width:1vmin; position:relative; background-image:linear-gradient(to left,rgba(0,0,0,.2),transparent,rgba(255,255,255,.15)),linear-gradient(to top,transparent 5%,var(--stem) 20%,var(--stem-light)); box-shadow:inset 0 0 2px rgba(0,0,0,.5); animation:grow-stem 3.5s .3s backwards; }
    .flower--1 .flower__line { height:70vmin; } .flower--2 .flower__line { height:60vmin; } .flower--3 .flower__line { height:55vmin; }
    @keyframes grow-stem { 0%{height:0;border-radius:1vmin} }
    .flower__line__leaf { --w:7vmin; --h:calc(var(--w) + 2vmin); position:absolute; width:var(--w); height:var(--h); background-image:linear-gradient(to top,rgba(20,117,122,.4),var(--stem-light)); }
    .leaf-r { left:110%; border-top-right-radius:var(--h); border-bottom-left-radius:var(--h); transform:rotate(70deg) rotateY(30deg); animation:bloom-r var(--fl-speed,.8s) backwards; }
    .leaf-l { left:-620%; border-top-left-radius:var(--h); border-bottom-right-radius:var(--h); transform:rotate(-70deg) rotateY(30deg); animation:bloom-l var(--fl-speed,.8s) backwards; }
    @keyframes bloom-r { 0%{transform-origin:left;transform:rotate(70deg) rotateY(30deg) scale(0)} }
    @keyframes bloom-l { 0%{transform-origin:right;transform:rotate(-70deg) rotateY(30deg) scale(0)} }
    .f1-ll1{top:20%;animation-delay:1.6s}.f1-ll2{top:45%;animation-delay:1.4s}.f1-ll3{top:20%;animation-delay:1.2s}.f1-ll4{top:45%;animation-delay:1.0s}
    .f2-ll1{top:25%;animation-delay:1.9s}.f2-ll2{top:55%;animation-delay:1.7s}.f2-ll3{top:25%;animation-delay:1.5s}.f2-ll4{top:55%;animation-delay:1.3s}
    .f3-ll1{top:25%;animation-delay:2.5s}.f3-ll2{top:55%;animation-delay:2.3s}.f3-ll3{top:25%;animation-delay:2.1s}.f3-ll4{top:55%;animation-delay:1.9s}
    .flower__head { width:50vmin; height:50vmin; position:relative; margin-bottom:-25vmin; z-index:2; transition:transform .6s cubic-bezier(.34,1.56,.64,1),opacity .5s ease; transform-origin:center center; }
    .flower__head.dead { transform:scale(0) rotate(25deg) !important; opacity:0 !important; }
    .flower__head.ghost { transform:scale(0.18) rotate(10deg); opacity:.22; filter:grayscale(1) brightness(.7); cursor:pointer; transition:transform .3s ease, opacity .3s ease, filter .3s ease; }
    .flower__head.ghost:hover, .flower__head.ghost:active { opacity:.45; transform:scale(0.22) rotate(8deg); }
    @keyframes replant-bloom { 0%{transform:scale(0) rotate(-20deg);opacity:0} 60%{transform:scale(1.15) rotate(6deg);opacity:1} 80%{transform:scale(.92) rotate(-3deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
    .flower__head svg { width:100%; height:100%; overflow:visible; }
    .flower__head::before { content:''; position:absolute; inset:10%; border-radius:50%; background:radial-gradient(circle,rgba(255,143,171,.18) 0%,transparent 70%); animation:pulse-glow 3s ease-in-out infinite; }
    @keyframes pulse-glow { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.15)} }
    .cdot { fill:var(--gold); filter:drop-shadow(0 0 3px var(--gold)); transform-origin:200px 200px; animation:pop-dot .5s ease both; }
    @keyframes pop-dot { 0%{transform:scale(0);opacity:0} 65%{transform:scale(1.4);opacity:1} 100%{transform:scale(1);opacity:1} }
    .pt { fill:none; stroke:var(--petal); stroke-width:3.5; stroke-opacity:.85; stroke-linecap:round; stroke-dasharray:285; stroke-dashoffset:285; animation:draw-pt .9s ease both; }
    @keyframes draw-pt { to{stroke-dashoffset:0} }
    .fh1 .cdot{animation-delay:1.05s}.fh1 .pt:nth-child(2){animation-delay:1.10s}.fh1 .pt:nth-child(3){animation-delay:1.19s}.fh1 .pt:nth-child(4){animation-delay:1.28s}.fh1 .pt:nth-child(5){animation-delay:1.37s}.fh1 .pt:nth-child(6){animation-delay:1.46s}.fh1 .pt:nth-child(7){animation-delay:1.55s}.fh1 .pt:nth-child(8){animation-delay:1.64s}.fh1 .pt:nth-child(9){animation-delay:1.73s}
    .fh2 .cdot{animation-delay:1.40s}.fh2 .pt:nth-child(2){animation-delay:1.45s}.fh2 .pt:nth-child(3){animation-delay:1.54s}.fh2 .pt:nth-child(4){animation-delay:1.63s}.fh2 .pt:nth-child(5){animation-delay:1.72s}.fh2 .pt:nth-child(6){animation-delay:1.81s}.fh2 .pt:nth-child(7){animation-delay:1.90s}.fh2 .pt:nth-child(8){animation-delay:1.99s}.fh2 .pt:nth-child(9){animation-delay:2.08s}
    .fh3 .cdot{animation-delay:1.75s}.fh3 .pt:nth-child(2){animation-delay:1.80s}.fh3 .pt:nth-child(3){animation-delay:1.89s}.fh3 .pt:nth-child(4){animation-delay:1.98s}.fh3 .pt:nth-child(5){animation-delay:2.07s}.fh3 .pt:nth-child(6){animation-delay:2.16s}.fh3 .pt:nth-child(7){animation-delay:2.25s}.fh3 .pt:nth-child(8){animation-delay:2.34s}.fh3 .pt:nth-child(9){animation-delay:2.43s}
    .sparkle { position:absolute; border-radius:50%; background:var(--petal); pointer-events:none; animation:float-up var(--sp-dur,3.5s) ease-in infinite var(--sp-del,1s); }
    @keyframes float-up { 0%{opacity:0;transform:translateY(0)} 20%{opacity:.9} 80%{opacity:.4} 100%{opacity:0;transform:translateY(-24vmin) translateX(var(--sp-x,1vmin));filter:blur(1px)} }
    .f-tip { position:fixed; z-index:400; pointer-events:none; background:rgba(15,8,28,.9); backdrop-filter:blur(14px); border:1px solid rgba(255,143,171,.35); border-radius:30px; padding:.5rem 1.1rem; font-size:1rem; font-style:italic; color:#fff; white-space:nowrap; opacity:0; transform:translateX(-50%) translateY(4px); transition:opacity .35s,transform .35s; }
    .f-tip.show { opacity:1; transform:translateX(-50%) translateY(-8px); }
    /* grass */
    .ground-glow { position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); width:70vmin; height:12vmin; background:radial-gradient(ellipse,rgba(20,117,122,.15) 0%,transparent 70%); z-index:1; pointer-events:none; }
    .grass-wrap { position:absolute; bottom:0; z-index:5; animation:grow-grass 1.2s var(--gd,2s) backwards; cursor:pointer; transition:opacity 0.6s ease; }
    @keyframes grow-grass { 0%{transform:scaleY(0)} }
    .blade { position:absolute; bottom:0; width:.9vmin; border-radius:.5vmin .5vmin 0 0; background:linear-gradient(to top,var(--stem) 20%,var(--stem-light)); transform-origin:bottom center; animation:sway-blade 3.5s ease-in-out infinite var(--bd,0s); }
    @keyframes sway-blade { 0%,100%{transform:rotate(var(--br,-3deg))} 50%{transform:rotate(var(--br2,3deg))} }
    .long-leaf { position:absolute; bottom:0; width:2vmin; border-top-left-radius:100%; border-left:1.5vmin solid var(--leaf); transform-origin:bottom center; -webkit-mask-image:linear-gradient(to top,transparent 15%,#079097 70%); mask-image:linear-gradient(to top,transparent 15%,#079097 70%); }
    .long-leaf--a { height:40vmin; animation:leaf-sway-a 4s linear infinite,grow-ans 2s 2.2s backwards; }
    .long-leaf--b { height:60vmin; width:1.5vmin; border-left-width:1.2vmin; animation:leaf-sway-b 3s linear infinite,grow-ans 2s 1.8s backwards; }
    @keyframes leaf-sway-a { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg) scale(1.05)} }
    @keyframes leaf-sway-b { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(6deg)} }
    @keyframes grow-ans { 0%{transform:scale(0);opacity:0} }
    .leaf-container { position:absolute; bottom:0; cursor:pointer; transition:opacity 0.6s ease; }
    /* neon left grass */
    #grass-neon-left .blade { background:linear-gradient(to top,#00b85a 20%,#00ffaa); box-shadow:0 0 8px #00ff88,0 0 18px rgba(0,255,136,.45),inset 0 0 4px rgba(0,255,136,.3); }
    @keyframes neon-pulse { 0%,100%{filter:drop-shadow(0 0 4px rgba(0,255,136,.5));} 50%{filter:drop-shadow(0 0 12px rgba(0,255,136,.9)) drop-shadow(0 0 20px rgba(0,255,200,.4));} }
    #grass-neon-left { animation:neon-pulse 2.5s ease-in-out infinite; }

    /* ══ SHOOTING STAR TEXT BOXES ══ */
    .shoot-box {
      position:fixed; z-index:80; cursor:pointer; pointer-events:all;
      display:inline-flex; align-items:center; gap:7px;
      padding:7px 18px 7px 13px; border-radius:999px;
      border:1px solid rgba(255,143,171,.65);
      background:rgba(10,3,22,.88); backdrop-filter:blur(12px);
      white-space:nowrap;
      box-shadow:-14px 0 32px 6px rgba(255,100,160,.6),-40px 0 58px 10px rgba(255,80,150,.28),-80px 0 85px 14px rgba(180,40,120,.12),0 0 14px 3px rgba(255,143,171,.45);
      opacity:0;
      animation:shoot-across var(--sd,2s) cubic-bezier(.12,.8,.32,1) forwards;
    }
    .shoot-box.caught { pointer-events:none !important; animation:shoot-caught .32s ease forwards !important; }
    @keyframes shoot-caught { 0%{transform:scale(1);opacity:1;filter:brightness(1);} 55%{transform:scale(1.7);opacity:.9;filter:brightness(3.5);} 100%{transform:scale(0);opacity:0;} }
    @keyframes shoot-across {
      0%   { opacity:0; transform:translateX(var(--sx,-200px)) translateY(0); }
      5%   { opacity:1; }
      95%  { opacity:1; }
      100% { opacity:0; transform:translateX(calc(100vw + 280px)) translateY(var(--dy,0px)); }
    }
    .shoot-icon { font-size:clamp(1rem,3vmin,1.5rem); line-height:1; display:block; animation:icon-spin 1.8s linear infinite; }
    @keyframes icon-spin { to{transform:rotate(360deg);} }
    .shoot-text { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(.78rem,2.1vmin,1rem); color:rgba(255,255,255,.95); letter-spacing:.04em; text-shadow:0 0 10px rgba(255,143,171,.85); }
    .shoot-trail-dot { position:fixed; z-index:79; pointer-events:none; border-radius:50%; background:radial-gradient(circle,rgba(255,143,171,.9),transparent 70%); animation:trail-shrink var(--td,.5s) ease forwards; }
    @keyframes trail-shrink { 0%{opacity:.85;transform:scale(1);} 100%{opacity:0;transform:scale(.08) translateY(6px);} }

    /* ══ KISS POPUP ══ */
    #kiss-popup { position:fixed; inset:0; z-index:600; display:flex; align-items:center; justify-content:center; pointer-events:none; opacity:0; transition:opacity .3s; }
    #kiss-popup.show { opacity:1; pointer-events:all; }
    .kiss-box { background:rgba(10,3,22,.97); backdrop-filter:blur(28px); border:1px solid rgba(255,143,171,.6); border-radius:36px; padding:3rem 3.4rem 2.6rem; text-align:center; max-width:340px; width:88%; position:relative; overflow:hidden; animation:kiss-pop .55s cubic-bezier(.34,1.56,.64,1); }
    @keyframes kiss-pop { 0%{transform:scale(.15) rotate(-20deg);opacity:0} }
    .kiss-title { font-size:clamp(1.9rem,5.5vw,2.8rem); font-style:italic; font-weight:300; color:#fff; margin-bottom:.3rem; text-shadow:0 0 22px rgba(255,143,171,.75); }
    .kiss-emoji-wrap { display:block; font-size:clamp(5rem,18vw,8.5rem); line-height:1; margin:.5rem auto .6rem; animation:kiss-bounce .7s ease-in-out infinite alternate; transform-origin:center bottom; }
    @keyframes kiss-bounce { 0%{transform:scale(1) rotate(-8deg);filter:drop-shadow(0 0 14px rgba(255,80,130,.8));} 35%{transform:scale(1.22) rotate(6deg);filter:drop-shadow(0 0 38px rgba(255,60,120,1));} 70%{transform:scale(.95) rotate(-4deg);} 100%{transform:scale(1.15) rotate(5deg);filter:drop-shadow(0 0 28px rgba(255,120,170,.9));} }
    .kiss-spark { position:absolute; font-size:clamp(.85rem,2.5vw,1.2rem); pointer-events:none; opacity:0; animation:spark-burst var(--sf-dur,1.1s) ease-out var(--sf-del,0s) infinite; }
    @keyframes spark-burst { 0%{opacity:1;transform:translate(0,0) scale(1.2);} 80%{opacity:.6;} 100%{opacity:0;transform:translate(var(--sf-x,40px),var(--sf-y,-70px)) scale(.3);} }
    .kiss-sub { font-size:1.05rem; color:var(--petal); font-style:italic; }
    .kiss-tap { font-size:.72rem; color:rgba(255,255,255,.24); margin-top:1.3rem; font-style:italic; }

    /* ══ LOVE THEME ══ */
    #love-overlay { position:fixed; inset:0; z-index:500; background:linear-gradient(135deg,#ff007f 0%,#ff4da6 30%,#ff69b4 60%,#ffb6d9 100%); opacity:0; pointer-events:none; transition:opacity 1.2s ease; overflow:hidden; }
    .love-bg-heart { position:absolute; pointer-events:none; opacity:0; animation:love-float var(--lf-dur,6s) ease-in-out infinite var(--lf-del,0s); }
    @keyframes love-float { 0%{opacity:0;transform:translateY(0) rotate(var(--lf-r,0deg));} 20%{opacity:.25;} 50%{opacity:.35;transform:translateY(-28px) rotate(calc(var(--lf-r,0deg)+12deg));} 80%{opacity:.2;} 100%{opacity:0;transform:translateY(-10px) rotate(var(--lf-r,0deg));} }
    #love-text-wrap { position:absolute; inset:0; display:flex; align-items:center; pointer-events:none; overflow:hidden; }
    #love-text { display:block; white-space:nowrap;
      /* ↓↓ CUSTOMIZE FONT HERE ↓↓ */
      font-family:'Oswald', sans-serif; /* ← change font */
      font-weight:600;                  /* ← change weight */
      font-size:clamp(7rem,9vw,8rem); /* ← change size  */
      /* ↑↑ CUSTOMIZE FONT HERE ↑↑ */
      font-style:normal; color:#fff; text-shadow:0 0 40px rgba(255,255,255,.9),0 0 80px rgba(255,255,255,.4),0 6px 24px rgba(140,0,60,.5); letter-spacing:.02em; transform:translateX(110vw); }
    #love-text.animate { animation:love-scroll 7s linear forwards; }
    @keyframes love-scroll { 0%{transform:translateX(110vw);} 100%{transform:translateX(-260vw);} }
    /* ══ HAPPY OVERLAY ══ */
    #happy-overlay {
      position:fixed; inset:0; z-index:700;
      background:radial-gradient(ellipse 90% 70% at 50% 55%, #0d2b5e 0%, #081a3a 50%, #020810 100%);
      opacity:0; pointer-events:none;
      transition:opacity 1.1s ease;
      display:flex; align-items:center; justify-content:center; flex-direction:column;
      overflow:hidden;
    }
    #happy-overlay.show { opacity:1; pointer-events:all; }
    #happy-overlay-stars { position:absolute; inset:0; pointer-events:none; }
    #happy-overlay-text {
      font-family:'Cormorant Garamond',serif;
      font-weight:700; font-style:normal;
      font-size:clamp(2.2rem,7vw,5.5rem);
      color:#fff;
      text-align:center;
      letter-spacing:.06em;
      line-height:1.25;
      padding:0 1.5rem;
      text-shadow:0 0 30px rgba(100,180,255,.9), 0 0 70px rgba(60,130,255,.5), 0 4px 20px rgba(0,50,180,.6);
      min-height:1.3em;
    }
    #happy-cursor {
      display:inline-block;
      width:3px; height:1em;
      background:#7bc8ff;
      margin-left:4px;
      vertical-align:middle;
      border-radius:2px;
      animation:cursor-blink .7s step-end infinite;
      box-shadow:0 0 8px rgba(100,180,255,.9);
    }
    @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .happy-star { position:absolute; border-radius:50%; background:#7bc8ff; opacity:.4; animation:twinkle var(--dur,3s) ease-in-out infinite var(--del,0s); }
    .happy-glow-line {
      position:absolute; left:0; right:0; height:1px;
      background:linear-gradient(to right, transparent, rgba(100,180,255,.3) 20%, rgba(100,200,255,.6) 50%, rgba(100,180,255,.3) 80%, transparent);
      pointer-events:none;
    }
  </style>
</head>
<body class="not-loaded">
  <div class="night"></div>
  <div id="stars"></div>

  <div id="love-overlay">
    <div id="love-text-wrap"><span id="love-text">HAPPY 7TH MONTH  Darling</span></div>
  </div>

  <!-- Happy Overlay (double-tap "Happy" at top) -->
  <div id="happy-overlay">

        <div class="sparkle" style="width:.5vmin;height:.5vmin;left:68%;top:52%;--sp-del:3s;--sp-dur:4.2s;--sp-x:1.5vmin;"></div>

          <path class="pt" transform="rotate(45 200 200)" d="M200 200C220 80 320 120 260 200"/>
          <path class="pt" transform="rotate(90 200 200)" d="M200 200C220 80 320 120 260 200"/>
          <path class="pt" transform="rotate(135 200 200)" d="M200 200C220 80 320 120 260 200"/>
          <path class="pt" transform="rotate(180 200 200)" d="M200 200C220 80 320 120 260 200"/>
          <path class="pt" transform="rotate(225 200 200)" d="M200 200C220 80 320 120 260 200"/>
          <path class="pt" transform="rotate(270 200 200)" d="M200 200C220 80 320 120 260 200"/>
          <path class="pt" transform="rotate(315 200 200)" d="M200 200C220 80 320 120 260 200"/>

        <div class="sparkle" style="width:.5vmin;height:.5vmin;left:58%;top:56%;--sp-del:3.2s;--sp-dur:4s;--sp-x:1vmin;"></div>

        <div class="flower__line__leaf leaf-r f3-ll1"></div><div class="flower__line__leaf leaf-r f3-ll2"></div>
        <div class="flower__line__leaf leaf-l f3-ll3"></div><div class="flower__line__leaf leaf-l f3-ll4"></div>

    <div class="ground-glow"></div>
    <div id="grass-neon-left" class="grass-wrap" style="left:-38vmin;bottom:0;--gd:1.8s;">
      <div class="blade" style="left:0;height:30vmin;--br:-4deg;--br2:3deg;--bd:.0s;"></div>
      <div class="blade" style="left:2vmin;height:38vmin;--br:-2deg;--br2:5deg;--bd:.3s;"></div>
      <div class="blade" style="left:4vmin;height:25vmin;--br:-6deg;--br2:2deg;--bd:.1s;"></div>
      <div class="blade" style="left:6vmin;height:33vmin;--br:-3deg;--br2:4deg;--bd:.4s;"></div>
    </div>

  <script>
    const SECRET_NAME='pookie';
    const loginScreen=document.getElementById('login-screen');
    const nameInput=document.getElementById('name-input');
    const enterBtn=document.getElementById('enter-btn');
    const loginError=document.getElementById('login-error');
    const greeting=document.getElementById('greeting');
    const message=document.getElementById('message');
    const kissPopup=document.getElementById('kiss-popup');
    const kissSparkWrap=document.getElementById('kiss-sparks-wrap');
    const loveOverlay=document.getElementById('love-overlay');
    const loveTextEl=document.getElementById('love-text');
    const starsEl=document.getElementById('stars');
    const petNameEl=document.getElementById('pet-name-el');

    // Stars
    for(let i=0;i<90;i++){const s=document.createElement('div');s.className='star';const sz=.8+Math.random()*2;s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*72}%;width:${sz}px;height:${sz}px;--dur:${2+Math.random()*3}s;--del:${Math.random()*5}s;`;starsEl.appendChild(s);}

    // Love overlay hearts
    const lhc=['#ffffff','#ffe0ef','#ffb6c1','#fff0f5','#ffd6e8'];
    for(let i=0;i<20;i++){const lh=document.createElement('div');lh.className='love-bg-heart';const sz=18+Math.random()*65;const col=lhc[Math.floor(Math.random()*lhc.length)];lh.innerHTML=`<svg width="${sz}" height="${sz*.9}" viewBox="0 0 100 88" xmlns="http://www.w3.org/2000/svg"><path d="M50,85 C18,68 0,50 0,30 C0,13 13,1 28,1 C37,1 45,6 50,13 C55,6 63,1 72,1 C87,1 100,13 100,30 C100,50 82,68 50,85Z" fill="${col}"/></svg>`;lh.style.cssText=`left:${Math.random()*90}%;top:${Math.random()*88}%;--lf-dur:${4+Math.random()*6}s;--lf-del:${Math.random()*4}s;--lf-r:${(Math.random()-.5)*40}deg;`;loveOverlay.appendChild(lh);}

    // ── Pet name cycling ──
    const petNames=['Pookie','Babyyy','Darling','Mommy','Queen','Littly Princey','Rosogolla','Kuchu puchu','Cuttie','Love'];
    let petIdx=0;
    function cyclePet(){
      petNameEl.classList.add('leaving');
      setTimeout(()=>{
        petIdx=(petIdx+1)%petNames.length;
        petNameEl.textContent=petNames[petIdx];
        petNameEl.classList.remove('leaving');
        petNameEl.classList.add('entering');
        requestAnimationFrame(()=>requestAnimationFrame(()=>petNameEl.classList.remove('entering')));
      },440);
    }
    setTimeout(()=>setInterval(cyclePet,2800),3200);

    // ── Flowers ──
    const deadMap={},tapMap={},firstTapDone={};
    let consecutiveKills=0,killResetTimer=null,massReviveActive=false;
    const tipEl=document.createElement('div');tipEl.className='f-tip';document.body.appendChild(tipEl);let tipTimer;
    function showTip(x,y,msg){tipEl.textContent=msg;tipEl.style.left=x+'px';tipEl.style.top=y+'px';tipEl.classList.remove('show');void tipEl.offsetWidth;tipEl.classList.add('show');clearTimeout(tipTimer);tipTimer=setTimeout(()=>tipEl.classList.remove('show'),2800);}
    function triggerMassRevive(){if(massReviveActive)return;massReviveActive=true;clearTimeout(killResetTimer);document.querySelectorAll('.flower').forEach(f=>{deadMap[f.dataset.flower]=true;f.querySelector('.flower__head').classList.add('dead');});showTip(window.innerWidth/2,window.innerHeight*.45,'💫 together we fall...');setTimeout(()=>{showTip(window.innerWidth/2,window.innerHeight*.45,'🌸 together we rise 🌸');document.querySelectorAll('.flower').forEach((f,i)=>setTimeout(()=>{deadMap[f.dataset.flower]=false;const h=f.querySelector('.flower__head');h.classList.remove('dead');h.classList.remove('ghost');},i*420));setTimeout(()=>{massReviveActive=false;},2200);},2600);}

    function replantFlower(flower,cx,cy){
      const id=flower.dataset.flower;
      if(!deadMap[id])return;
      deadMap[id]=false;
      const head=flower.querySelector('.flower__head');
      head.classList.remove('ghost');
      head.style.animation='none';
      void head.offsetWidth;
      head.style.animation='replant-bloom .85s cubic-bezier(.34,1.56,.64,1) forwards';
      setTimeout(()=>{ head.style.animation=''; },900);
      showTip(cx,cy-10,'🌱 back to life!');
    }

    function killFlower(flower,cx,cy){
      if(massReviveActive)return;
      const id=flower.dataset.flower;
      if(deadMap[id])return;
      consecutiveKills++;
      clearTimeout(killResetTimer);
      if(consecutiveKills>=4){consecutiveKills=0;triggerMassRevive();return;}
      killResetTimer=setTimeout(()=>{consecutiveKills=0;},9000);
      deadMap[id]=true;
      const head=flower.querySelector('.flower__head');
      head.classList.add('dead');
      showTip(cx,cy-10,'😵 you killed me...');
      // after 1.2s switch to ghost state so she can re-plant
      setTimeout(()=>{
        head.classList.remove('dead');
        head.classList.add('ghost');
        showTip(cx,cy-10,'🌿 tap to re-plant...');
      },1400);
    }

    document.querySelectorAll('.flower').forEach(flower=>{
      const id=flower.dataset.flower;tapMap[id]=0;
      flower.addEventListener('click',e=>{
        if(deadMap[id]){replantFlower(flower,e.clientX,e.clientY);return;}
        if(!firstTapDone[id]){firstTapDone[id]=true;showTip(e.clientX,e.clientY-10,'happp 💕');}
      });
      flower.addEventListener('dblclick',e=>{e.stopPropagation();killFlower(flower,e.clientX,e.clientY);});
      flower.addEventListener('touchend',e=>{
        const now=Date.now();
        if(now-tapMap[id]<320){
          if(e.cancelable)e.preventDefault();
          const t=e.changedTouches[0];
          killFlower(flower,t.clientX,t.clientY);
        } else {
          if(deadMap[id]){const t=e.changedTouches[0];replantFlower(flower,t.clientX,t.clientY);}
          else if(!firstTapDone[id]){firstTapDone[id]=true;const t=e.changedTouches[0];showTip(t.clientX,t.clientY-10,'happp 💕');}
        }
        tapMap[id]=now;
      },{passive:false});
    });

    // ── Grass / leaf fade ──
    function fadeAndRespawn(el){if(el._fading)return;el._fading=true;el.style.opacity='0';setTimeout(()=>{const parent=el.parentNode;if(!parent)return;const clone=el.cloneNode(true);clone._fading=false;clone.style.opacity='0';clone.style.transition='none';clone.style.animationDelay='0.15s';parent.replaceChild(clone,el);if(clone.classList.contains('grass-fadeable'))attachGrassFade(clone);if(clone.classList.contains('leaf-container'))attachLeafFade(clone);requestAnimationFrame(()=>requestAnimationFrame(()=>{clone.style.transition='opacity 0.9s ease';clone.style.opacity='1';}));},700);}
    function attachGrassFade(el){const tt={t:0};el.addEventListener('dblclick',e=>{e.stopPropagation();fadeAndRespawn(el);});el.addEventListener('touchend',e=>{const now=Date.now();if(now-tt.t<320){if(e.cancelable)e.preventDefault();fadeAndRespawn(el);}tt.t=now;},{passive:false});}
    function attachLeafFade(el){const tt={t:0};el.addEventListener('dblclick',e=>{e.stopPropagation();fadeAndRespawn(el);});el.addEventListener('touchend',e=>{const now=Date.now();if(now-tt.t<320){if(e.cancelable)e.preventDefault();fadeAndRespawn(el);}tt.t=now;},{passive:false});}
    document.querySelectorAll('.grass-fadeable').forEach(g=>attachGrassFade(g));
    document.querySelectorAll('.leaf-container').forEach(l=>attachLeafFade(l));

    // ── Love theme ──
    let loveThemeActive=false,loveNeonLastTap=0;
    function triggerLoveTheme(){if(loveThemeActive)return;loveThemeActive=true;shootActive=false;const flowersEl=document.querySelector('.flowers');[flowersEl,starsEl,greeting,message].forEach(el=>{el.style.transition='opacity 1s ease';el.style.opacity='0';});loveOverlay.style.opacity='1';loveOverlay.style.pointerEvents='all';setTimeout(()=>{loveTextEl.style.animation='none';void loveTextEl.offsetWidth;loveTextEl.style.animation='';loveTextEl.classList.add('animate');},1300);setTimeout(()=>{loveOverlay.style.opacity='0';loveOverlay.style.pointerEvents='none';[flowersEl,starsEl,greeting,message].forEach(el=>{el.style.transition='opacity 1.2s ease';el.style.opacity='1';});setTimeout(()=>{loveTextEl.classList.remove('animate');loveThemeActive=false;shootActive=true;spawnShooter();},1300);},9400);}
    const neonGrass=document.getElementById('grass-neon-left');
    neonGrass.addEventListener('dblclick',e=>{e.stopPropagation();triggerLoveTheme();});
    neonGrass.addEventListener('touchend',e=>{const now=Date.now();if(now-loveNeonLastTap<320){if(e.cancelable)e.preventDefault();triggerLoveTheme();}loveNeonLastTap=now;},{passive:false});

    // ── Shooting star text boxes ──
    const shootMsgs=[
      {text:"I love you baby 💕",icon:"💗"},{text:"I wanna be with you",icon:"🌸"},
      {text:"Ehehehehehhe 😁",icon:"✨"},{text:"Can you see me? 👀",icon:"💖"},
      {text:"Catch me!",icon:"⭐"},{text:"Bleeehhhhhhhhhhhhhh",icon:"💞"},
      {text:"Jingalalla 🎵",icon:"🌟"},{text:"Ayyy dhoro amare",icon:"💝"},
      {text:"Paro nahhhh 😤",icon:"🩷"},{text:"Tryyy it ✨",icon:"💫"},
      {text:"Somerhing waitsss 🌸",icon:"🌺"},
    ];
    const sparkE=['💗','💕','✨','🌸','💫','⭐','🌟','💖','🩷'];
    let shootActive=false;
    const activeShooters=new Set();
    const MAX_SHOOT=5;

    function spawnShooter(){
      if(!shootActive||activeShooters.size>=MAX_SHOOT){if(shootActive)setTimeout(spawnShooter,100);return;}
      const sid=Math.random().toString(36).substring(2,9);
      activeShooters.add(sid);
      const entry=shootMsgs[Math.floor(Math.random()*shootMsgs.length)];
      const el=document.createElement('div');el.className='shoot-box';
      const topPct=8+Math.random()*76;
      const dur=19.5+Math.random()*1.5;
      const dy=(Math.random()-.5)*25;
      const startX=-(120+Math.random()*80);
      el.style.cssText=`top:${topPct}%;--sd:${dur}s;--sx:${startX}px;--dy:${dy}px;`;
      el.innerHTML=`<span class="shoot-icon">${entry.icon}</span><span class="shoot-text">${entry.text}</span>`;
      document.body.appendChild(el);
      const cleanup=()=>{clearInterval(trailIv);if(el.parentNode)el.remove();activeShooters.delete(sid);};
      // trail
      let trailIv=setInterval(()=>{
        if(!el.parentNode){clearInterval(trailIv);return;}
        const r=el.getBoundingClientRect();
        if(r.right<=0||r.left>=window.innerWidth+60)return;
        const dot=document.createElement('div');dot.className='shoot-trail-dot';
        const sz=3+Math.random()*7;
        dot.style.cssText=`left:${r.left-8-Math.random()*24}px;top:${r.top+r.height/2-sz/2+(Math.random()-.5)*10}px;width:${sz}px;height:${sz}px;--td:${.28+Math.random()*.3}s;`;
        document.body.appendChild(dot);setTimeout(()=>dot.remove(),50);
      },50);
      // catch
      const doCatch=e=>{e.stopPropagation();if(el.classList.contains('caught'))return;el.classList.add('caught');openKiss();setTimeout(cleanup,30);};
      el.addEventListener('click',doCatch);
      el.addEventListener('touchend',e=>{if(e.cancelable)e.preventDefault();doCatch(e);},{passive:false});
      setTimeout(cleanup,dur*1000+500);
      setTimeout(spawnShooter,100+Math.random()*1600);
    }

    let kissTimer;
    function openKiss(){
      kissSparkWrap.innerHTML='';
      for(let i=0;i<12;i++){const sp=document.createElement('div');sp.className='kiss-spark';sp.textContent=sparkE[Math.floor(Math.random()*sparkE.length)];sp.style.cssText=`left:${8+Math.random()*84}%;top:${8+Math.random()*84}%;--sf-x:${(Math.random()-.5)*110}px;--sf-y:${-(25+Math.random()*90)}px;--sf-dur:${.8+Math.random()*.9}s;--sf-del:${Math.random()*.55}s;`;kissSparkWrap.appendChild(sp);}
      kissPopup.classList.add('show');clearTimeout(kissTimer);kissTimer=setTimeout(closeKiss,4800);
    }
    function closeKiss(){kissPopup.classList.remove('show');}

    function startScene(){document.body.classList.remove('not-loaded');greeting.classList.add('show');setTimeout(()=>message.classList.add('show'),300);setTimeout(()=>{shootActive=true;spawnShooter();},3000);}

    // ── Happy Overlay (double-tap greeting) ──
    const happyOverlay = document.getElementById('happy-overlay');
    const happyTextEl  = document.getElementById('happy-overlay-text');
    const happyCursor  = document.getElementById('happy-cursor');
    const happyStarsEl = document.getElementById('happy-overlay-stars');
    let happyOverlayActive = false, greetingLastTap = 0;

    // Populate blue stars
    for(let i=0;i<60;i++){const s=document.createElement('div');s.className='happy-star';const sz=.6+Math.random()*2.2;s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--dur:${2+Math.random()*3}s;--del:${Math.random()*5}s;`;happyStarsEl.appendChild(s);}

    function triggerHappyOverlay(){
      if(happyOverlayActive)return;
      happyOverlayActive=true;
      const flowersEl=document.querySelector('.flowers');
      [flowersEl,starsEl,greeting,message].forEach(el=>{el.style.transition='opacity 0.9s ease';el.style.opacity='0';});
      happyOverlay.classList.add('show');

      const fullText='Are you happy with me?';
      // Variable delays per character for intensity — long pause before "happy" and before "?"
      const charDelays=[0,90,90,90,90,90,90,90,
        520,                      // big pause → "A" of "happy"
        110,110,110,110,
        180,                      // pause after "happy "
        100,100,100,100,
        900,                      // big pause → "?"
      ];

      happyTextEl.innerHTML='';
      happyTextEl.appendChild(happyCursor);

      let i=0;
      function typeNext(){
        if(i<fullText.length){
          const span=document.createElement('span');
          span.textContent=fullText[i];
          span.style.cssText='opacity:0;transition:opacity .18s ease;';
          happyTextEl.insertBefore(span,happyCursor);
          requestAnimationFrame(()=>requestAnimationFrame(()=>{span.style.opacity='1';}));
          i++;
          const delay=charDelays[i]!==undefined?charDelays[i]:100;
          setTimeout(typeNext,delay);
        } else {
          // hide cursor after done
          setTimeout(()=>{happyCursor.style.display='none';},600);
          // wait, then return
          setTimeout(()=>{
            happyOverlay.classList.remove('show');
            setTimeout(()=>{
              happyCursor.style.display='';
              happyTextEl.innerHTML='';
              happyTextEl.appendChild(happyCursor);
              [flowersEl,starsEl,greeting,message].forEach(el=>{el.style.transition='opacity 1.2s ease';el.style.opacity='1';});
              setTimeout(()=>{ happyOverlayActive=false; },1300);
            },1100);
          },2800);
        }
      }
      setTimeout(typeNext,900);
    }

    greeting.addEventListener('dblclick',e=>{e.stopPropagation();triggerHappyOverlay();});
    greeting.style.pointerEvents='auto';
    greeting.addEventListener('touchend',e=>{const now=Date.now();if(now-greetingLastTap<320){if(e.cancelable)e.preventDefault();triggerHappyOverlay();}greetingLastTap=now;},{passive:false});
    function enterScene(){loginScreen.classList.add('fade-out');setTimeout(()=>{loginScreen.style.display='none';startScene();},1300);}

    const saved=localStorage.getItem('ann_name');
    if(saved){loginScreen.style.display='none';startScene();}

    function tryEnter(){const val=nameInput.value.trim();if(!val){showErr("please type something, love ♡");return;}if(val.toLowerCase()!==SECRET_NAME.toLowerCase()){showErr("hmm... try again ♡");return;}localStorage.setItem('ann_name',val);enterScene();}
    function showErr(m){loginError.textContent=m;nameInput.style.borderBottomColor='rgba(255,80,80,.5)';setTimeout(()=>{nameInput.style.borderBottomColor='';loginError.textContent='';},2200);}
    enterBtn.addEventListener('click',tryEnter);
    nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')tryEnter();});
  </script>
</body>
</html>
